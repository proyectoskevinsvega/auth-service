syntax = "proto3";

package auth.v1;

option go_package = "github.com/vertercloud/auth-service/internal/adapters/grpc/proto;proto";

// AuthService provides gRPC endpoints for inter-service authentication
// API version: v1
service AuthService {
  // ValidateToken validates a JWT token and returns user info
  rpc ValidateToken(ValidateTokenRequest) returns (ValidateTokenResponse);

  // RevokeToken revokes a token
  rpc RevokeToken(RevokeTokenRequest) returns (RevokeTokenResponse);

  // GetUserByID retrieves user information by ID
  rpc GetUserByID(GetUserByIDRequest) returns (GetUserByIDResponse);
}

// ValidateToken messages
message ValidateTokenRequest {
  string token = 1;
  string tenant_id = 2;
}

message ValidateTokenResponse {
  bool valid = 1;
  string user_id = 2;
  string email = 3;
  string username = 4;
  string tenant_id = 5;
  bool active = 6;
  bool email_verified = 7;
  bool two_factor_enabled = 8;
  string error_code = 9;
  string error_message = 10;
}

// RevokeToken messages
message RevokeTokenRequest {
  string token = 1;
  string tenant_id = 2;
}

message RevokeTokenResponse {
  bool success = 1;
  string message = 2;
}

// GetUserByID messages
message GetUserByIDRequest {
  string user_id = 1;
  string tenant_id = 2;
}

message GetUserByIDResponse {
  string id = 1;
  string username = 2;
  string email = 3;
  string tenant_id = 4;
  bool active = 5;
  bool email_verified = 6;
  bool two_factor_enabled = 7;
  string created_at = 8;
}
