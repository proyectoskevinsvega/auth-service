name: Deploy Auth Service to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Setup Go ──────────────────────────────────────────────────────────
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          cache-dependency-path: go.sum

      # ── 3. Build Binary ──────────────────────────────────────────────────────
      - name: Build Auth Service
        working-directory: ./
        run: |
          go mod download
          cd cmd/auth-service && go build -trimpath -ldflags="-s -w" -o ../../auth-service .

      # ── 4. Upload Binaries and Config to VPS ─────────────────────────────────
      - name: Upload to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_BACKEND_HOST }}
          username: ${{ secrets.VPS_BACKEND_USER }}
          key: ${{ secrets.VPS_BACKEND_SSH_KEY }}
          # Ajusta la ruta a los archivos estáticos o configs si es necesario (e.g. jwks.json)
          source: "auth-service"
          target: "/home/ubuntu/backend-vertercloud/auth-service/releases/${{ github.sha }}"
          strip_components: 0

      # ── 5. Switch symlink + restart + health check + rollback ────────────────
      - name: Activate release & health check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_BACKEND_HOST }}
          username: ${{ secrets.VPS_BACKEND_USER }}
          key: ${{ secrets.VPS_BACKEND_SSH_KEY }}
          script: |
            RELEASE_DIR="/home/ubuntu/backend-vertercloud/auth-service/releases/${{ github.sha }}"
            CURRENT_DIR="/home/ubuntu/backend-vertercloud/auth-service/current"
            if [ -L "$CURRENT_DIR" ]; then PREVIOUS=$(readlink -f "$CURRENT_DIR"); else PREVIOUS=""; fi

            # Copiar .env del deployment anterior o de la raíz
            if [ -n "$PREVIOUS" ] && [ -f "$PREVIOUS/.env" ]; then
              cp "$PREVIOUS/.env" "$RELEASE_DIR/.env"
            elif [ -f "/home/ubuntu/backend-vertercloud/auth-service/.env" ]; then
              cp "/home/ubuntu/backend-vertercloud/auth-service/.env" "$RELEASE_DIR/.env"
            fi

            # Copiar keys del deployment anterior o de la raíz o de current (CRÍTICO para Auth Service)
            if [ -n "$PREVIOUS" ] && [ -d "$PREVIOUS/keys" ]; then
              echo "Copiando keys desde el release anterior..."
              cp -r "$PREVIOUS/keys" "$RELEASE_DIR/keys"
            elif [ -d "/home/ubuntu/backend-vertercloud/auth-service/keys" ]; then
              echo "Copiando keys desde la raíz..."
              cp -r "/home/ubuntu/backend-vertercloud/auth-service/keys" "$RELEASE_DIR/keys"
            elif [ -d "/home/ubuntu/backend-vertercloud/auth-service/current/keys" ]; then
              echo "Copiando keys desde current/keys..."
              cp -r "/home/ubuntu/backend-vertercloud/auth-service/current/keys" "$RELEASE_DIR/keys"
            else
              echo "⚠️ ADVERTENCIA: No se encontró la carpeta 'keys'. El servicio podría fallar al arrancar."
            fi

            # Atomic switch
            ln -sfn "$RELEASE_DIR" "$CURRENT_DIR"

            echo "Reloading systemd and restarting Auth service..."
            sudo systemctl daemon-reload
            sudo systemctl restart auth-service

            # Health check (Damos más tiempo para que conecte a DB/Redis)
            echo "Esperando 10 segundos para el health check..."
            sleep 10
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8081/health)

            if [ "$HTTP_STATUS" != "200" ]; then
              echo "❌ Health check failed (HTTP $HTTP_STATUS) - Auth Service down, rolling back"
              sudo systemctl status auth-service --no-pager
              sudo journalctl -u auth-service -n 20 --no-pager
              
              if [ -n "$PREVIOUS" ] && [ -d "$PREVIOUS" ]; then
                echo "Rolling back to $PREVIOUS..."
                ln -sfn "$PREVIOUS" "$CURRENT_DIR"
                sudo systemctl daemon-reload
                sudo systemctl restart auth-service
              fi
              exit 1
            fi

            echo "✅ Deploy successful — Health check passed (HTTP $HTTP_STATUS) — Release: ${{ github.sha }}"

            # Cleanup: conservar solo los últimos 5 releases ordenados por fecha de modificación
            ls -1dt /home/ubuntu/backend-vertercloud/auth-service/releases/* | tail -n +6 | xargs -r -d '\n' rm -rf --
