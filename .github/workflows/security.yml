name: Security Scanning

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run every Monday at 9:00 AM UTC
    - cron: '0 9 * * 1'

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  gosec:
    name: Go Security Checker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Run Gosec Security Scanner
        uses: securego/gosec@master
        with:
          args: '-fmt sarif -out gosec-results.sarif ./...'

      - name: Upload Gosec results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: gosec-results.sarif
        continue-on-error: true

      - name: Run Gosec with JSON output for summary
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec -fmt json -out gosec-report.json ./... || true

      - name: Generate security summary
        if: always()
        run: |
          echo "## Gosec Security Report" >> $GITHUB_STEP_SUMMARY
          if [ -f gosec-report.json ]; then
            ISSUES=$(jq '.Stats.found' gosec-report.json || echo "0")
            echo "**Total Issues Found:** $ISSUES" >> $GITHUB_STEP_SUMMARY
            if [ "$ISSUES" -gt "0" ]; then
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "### Issues by Severity:" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              jq -r '.Issues[] | "\(.severity): \(.rule_id) - \(.details)"' gosec-report.json | head -20 >> $GITHUB_STEP_SUMMARY || echo "No details available" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
            else
              echo "✅ No security issues found!" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "⚠️ Report file not generated" >> $GITHUB_STEP_SUMMARY
          fi

  dependency-check:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck -json ./... > vuln-report.json || true

      - name: Generate vulnerability summary
        if: always()
        run: |
          echo "## Dependency Vulnerability Report" >> $GITHUB_STEP_SUMMARY
          if [ -f vuln-report.json ]; then
            VULNS=$(jq -s '[.[] | select(.finding != null)] | length' vuln-report.json || echo "0")
            echo "**Vulnerabilities Found:** $VULNS" >> $GITHUB_STEP_SUMMARY

            if [ "$VULNS" -gt "0" ]; then
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "### Affected Packages:" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              jq -r 'select(.finding != null) | "\(.finding.osv) - \(.finding.fixed_version // "No fix available")"' vuln-report.json | sort -u >> $GITHUB_STEP_SUMMARY || echo "Details not available" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
            else
              echo "✅ No known vulnerabilities in dependencies!" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "✅ No vulnerabilities detected" >> $GITHUB_STEP_SUMMARY
          fi

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: go
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:go"

  secrets-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  nancy:
    name: Nancy Vulnerability Scanner
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Write Go list in Nancy format
        run: go list -json -deps ./... > deps.json

      - name: Run Nancy
        uses: sonatype-nexus-community/nancy-github-action@main
        with:
          nancyCommand: sleuth --path deps.json
        continue-on-error: true

  staticcheck:
    name: Static Analysis (staticcheck)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: Run staticcheck
        run: |
          staticcheck -f json ./... > staticcheck-report.json || true

          echo "## Staticcheck Report" >> $GITHUB_STEP_SUMMARY
          ISSUES=$(jq length staticcheck-report.json || echo "0")
          echo "**Total Issues:** $ISSUES" >> $GITHUB_STEP_SUMMARY

          if [ "$ISSUES" -gt "0" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Top Issues:" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            jq -r '.[] | "\(.location.file):\(.location.line) - \(.message)"' staticcheck-report.json | head -20 >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ No issues found!" >> $GITHUB_STEP_SUMMARY
          fi

  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [gosec, dependency-check, codeql, secrets-scan, nancy, staticcheck]
    if: always()
    steps:
      - name: Generate overall summary
        run: |
          echo "## 🔒 Security Scanning Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Scanner | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Gosec | ${{ needs.gosec.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dependency Check | ${{ needs.dependency-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| CodeQL | ${{ needs.codeql.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Secret Scanning | ${{ needs.secrets-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Nancy | ${{ needs.nancy.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Staticcheck | ${{ needs.staticcheck.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.gosec.result }}" == "failure" ] || \
             [ "${{ needs.dependency-check.result }}" == "failure" ] || \
             [ "${{ needs.codeql.result }}" == "failure" ] || \
             [ "${{ needs.secrets-scan.result }}" == "failure" ]; then
            echo "⚠️ **Some security checks failed. Review the details above.**" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ **All security scans completed successfully**" >> $GITHUB_STEP_SUMMARY
          fi
