user www-data;
worker_processes auto;
worker_rlimit_nofile 65535; # Critical: Increase limit of file descriptors

pid /run/nginx.pid;
include /etc/nginx/modules-enabled/*.conf;

events {
    worker_connections 20000; # Increased for high concurrency
    multi_accept on;
    use epoll; # Best for Linux high-scale
}

http {
    ##
    # Basic Settings
    ##
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 30s; # Reduced to free up connections faster
    keepalive_requests 1000; # High requests per connection
    types_hash_max_size 2048;
    server_tokens off;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    ##
    # Buffer Optimization (Protects from disk I/O bottlenecks)
    ##
    client_body_buffer_size 16k;
    client_header_buffer_size 1k;
    client_max_body_size 10m;
    large_client_header_buffers 4 8k;

    ##
    # SSL Settings (Performance optimized)
    ##
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:50m; # Cache 50MB of sessions (approx 200k sessions)
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    
    # HSTS
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    ##
    # Gzip Settings
    ##
    gzip on;
    gzip_comp_level 5; # Balance between CPU and compression
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    ##
    # Rate Limiting
    ##
    # 10m zone can hold ~160,000 unique IP states
    limit_req_zone $binary_remote_addr zone=api_limit:20m rate=20r/s;

    ##
    # Cloudflare IP Configuration
    ##
    include /etc/nginx/conf.d/cloudflare_ips.conf;

    ##
    # Upstream (Horizontal scaling ready)
    ##
    upstream auth_service {
        server 127.0.0.1:8082; # Updated to match HTTP_PORT=8082
        
        # Critical for high RPS: Keep connections open to Go backend
        keepalive 100; 
        keepalive_requests 1000;
        keepalive_timeout 60s;
    }

    server {
        listen 80;
        listen [::]:80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name _;

        # SSL (Placeholders)
        # ssl_certificate /path/to/fullchain.pem;
        # ssl_certificate_key /path/to/privkey.pem;

        # Hardened Headers
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self';" always;

        location / {
            limit_req zone=api_limit burst=50 nodelay;

            proxy_pass http://auth_service;
            proxy_http_version 1.1; # Required for keepalive
            proxy_set_header Connection ""; # Required for keepalive
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Optimized Timeouts
            proxy_connect_timeout 5s;
            proxy_send_timeout 10s;
            proxy_read_timeout 10s;
            
            # Buffering tuning
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 16k;
            proxy_busy_buffers_size 64k;
        }

        location /swagger/ {
            proxy_pass http://auth_service/swagger/;
            proxy_set_header Host $host;
        }
    }
}
